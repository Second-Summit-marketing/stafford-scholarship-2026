name: Require spec on claude-ready PRs

# Required status check on every PR. If the PR's linked issue has the
# `claude-ready` label, the issue must also have `has-spec` (i.e., a
# valid ss-spec v=1 comment was posted and validated).
#
# PRs with no linked issue may use the `skip-issue-link` label + a
# "Skip-issue-link: <reason>" line in the body to bypass.
#
# Owner: github-repo-creator skill. DO NOT edit this file per-repo.

on:
  pull_request:
    types: [opened, edited, synchronize, ready_for_review, reopened, labeled, unlabeled]

permissions:
  issues: read
  pull-requests: read
  contents: read

jobs:
  check-spec:
    runs-on: ubuntu-latest
    steps:
      - name: Check linked issue has valid spec
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          echo "== Checking spec for PR ${REPO}#${PR_NUMBER} =="

          pr_json="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body,title,labels,baseRefName)"
          body="$(echo "$pr_json" | jq -r '.body // ""')"
          title="$(echo "$pr_json" | jq -r '.title // ""')"
          labels="$(echo "$pr_json" | jq -r '.labels[].name')"

          has_skip_issue_link=false
          while IFS= read -r lbl; do
            case "$lbl" in
              skip-issue-link) has_skip_issue_link=true ;;
            esac
          done <<< "$labels"

          # Extract linked issues from body/title via Closes/Fixes/Resolves keywords.
          # Matches: `Closes #42`, `Fixes Second-Summit-marketing/other#7` (cross-repo).
          # NOTE: `set +o pipefail` inside the command-substitution subshell is
          # required because grep exits 1 on no match; with pipefail on, a
          # no-match grep in the pipeline would kill the whole script silently
          # under `set -e`. This is a common pattern for optional-match pipes.
          linked_same_repo="$(
            set +o pipefail
            printf '%s\n%s\n' "$body" "$title" \
            | grep -oEi '(close[sd]?|fixe[sd]?|resolve[sd]?)[[:space:]]+#[0-9]+' \
            | grep -oE '#[0-9]+' \
            | tr -d '#' \
            | sort -u
          )"

          linked_cross_repo="$(
            set +o pipefail
            printf '%s\n%s\n' "$body" "$title" \
            | grep -oEi '(close[sd]?|fixe[sd]?|resolve[sd]?)[[:space:]]+[A-Za-z0-9._-]+/[A-Za-z0-9._-]+#[0-9]+' \
            | awk '{print $NF}' \
            | sort -u
          )"

          # Also check GraphQL closingIssuesReferences (the Development sidebar link).
          graphql_refs="$(
            gh api graphql -f query='
              query($owner:String!, $repo:String!, $pr:Int!) {
                repository(owner:$owner, name:$repo) {
                  pullRequest(number:$pr) {
                    closingIssuesReferences(first:20) {
                      nodes { number repository { nameWithOwner } }
                    }
                  }
                }
              }' \
              -F owner="${REPO%/*}" -F repo="${REPO#*/}" -F pr="$PR_NUMBER" \
              --jq '.data.repository.pullRequest.closingIssuesReferences.nodes[]
                    | if .repository.nameWithOwner == "'"$REPO"'"
                      then (.number | tostring)
                      else (.repository.nameWithOwner + "#" + (.number | tostring))
                      end' \
          )"

          # Merge same-repo references from all sources.
          # Same pipefail hazard as above — grep exits 1 if the merged stream
          # has no matching lines (e.g., no linked issues at all).
          same_repo="$(
            set +o pipefail
            printf '%s\n%s\n' "$linked_same_repo" "$graphql_refs" \
              | grep -E '^[0-9]+$' | sort -u
          )"
          cross_repo="$(
            set +o pipefail
            printf '%s\n%s\n' "$linked_cross_repo" "$graphql_refs" \
              | grep -E '/.+#[0-9]+$' | sort -u
          )"

          # Count total linked issues.
          total_linked=$(printf '%s\n%s\n' "$same_repo" "$cross_repo" | grep -cv '^$' || true)

          if [ "$total_linked" -eq 0 ]; then
            if $has_skip_issue_link; then
              if echo "$body" | grep -qE '^[[:space:]]*Skip-issue-link:[[:space:]]*\S'; then
                echo "No linked issue, but skip-issue-link override is in place — PASS."
                exit 0
              else
                echo "::error::skip-issue-link label present but body is missing the required 'Skip-issue-link: <reason>' line."
                exit 1
              fi
            else
              echo "::error::PR has no linked issue (no Closes/Fixes/Resolves keyword and no Development-sidebar link)."
              echo "::error::Either add 'Closes #<N>' to the PR body, or set the skip-issue-link label and add a 'Skip-issue-link: <reason>' line."
              exit 1
            fi
          fi

          fail=0

          # Check each same-repo linked issue.
          while IFS= read -r n; do
            [ -z "$n" ] && continue
            labels="$(gh issue view "$n" --repo "$REPO" --json labels --jq '.labels[].name' || true)"
            if echo "$labels" | grep -qx claude-ready; then
              if echo "$labels" | grep -qx has-spec; then
                echo "Issue #$n is claude-ready and has a valid spec — OK."
              else
                echo "::error file=$n::Linked issue #$n is claude-ready but has no valid spec comment."
                echo "::error::Add an 'ss-spec v=1' comment with all 7 required headings, or drop the claude-ready label."
                fail=1
              fi
            else
              echo "Issue #$n is not claude-ready — spec not required."
            fi
          done <<< "$same_repo"

          # Cross-repo linked issues: check them too (owner/repo#N format).
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            other_repo="${ref%#*}"
            other_num="${ref#*#}"
            labels="$(gh issue view "$other_num" --repo "$other_repo" --json labels --jq '.labels[].name' 2>/dev/null || true)"
            if [ -z "$labels" ]; then
              echo "Could not read labels on $ref — skipping (may be private cross-org reference)."
              continue
            fi
            if echo "$labels" | grep -qx claude-ready; then
              if echo "$labels" | grep -qx has-spec; then
                echo "Cross-repo $ref is claude-ready and has a valid spec — OK."
              else
                echo "::error::Cross-repo linked issue $ref is claude-ready but has no valid spec."
                fail=1
              fi
            fi
          done <<< "$cross_repo"

          exit $fail
