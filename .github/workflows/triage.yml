name: Auto-triage

on:
  issues:
    types: [opened, reopened]
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  issues: write
  pull-requests: write

jobs:
  label-issue:
    if: github.event_name == 'issues'
    runs-on: [self-hosted, linux, x64, ss-vps]
    steps:
      - name: Label by title prefix
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const labels = new Set();

            // Title-prefix heuristics.
            if (title.startsWith('spec:') || title.startsWith('spec ')) labels.add('spec-for-cursor');
            if (title.startsWith('bug:') || title.startsWith('fix:')) labels.add('bug');
            if (title.startsWith('feat:') || title.startsWith('feature:')) labels.add('feature');
            if (title.startsWith('docs:')) labels.add('area:docs');
            if (title.startsWith('test:') || title.startsWith('tests:')) labels.add('area:tests');
            if (title.startsWith('refactor:')) labels.add('area:refactor');
            if (title.startsWith('infra:') || title.startsWith('chore:')) labels.add('area:infra');

            // Body-based heuristic: no detail → needs-spec.
            const body = (context.payload.issue.body || '').trim();
            if (!labels.has('spec-for-cursor') && body.length < 80) {
              labels.add('needs-spec');
            }

            if (labels.size === 0) return;
            await github.rest.issues.addLabels({
              ...context.repo,
              issue_number: context.payload.issue.number,
              labels: [...labels],
            });

  label-pr:
    if: github.event_name == 'pull_request_target'
    runs-on: [self-hosted, linux, x64, ss-vps]
    steps:
      - name: Mark PR needs-review
        uses: actions/github-script@v7
        with:
          script: |
            // Defensive labeling: needs-review label may not exist if seed_labels.sh
            // was skipped or hasn't run yet in new repos. On missing label (422),
            // auto-create with fallback values, then retry. On other failures,
            // degrade gracefully to a warning rather than failing the job.
            try {
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: context.payload.pull_request.number,
                labels: ['needs-review'],
              });
            } catch (error) {
              if (error.status === 422) {
                // Label doesn't exist - try to create it and retry once
                try {
                  await github.rest.issues.createLabel({
                    ...context.repo,
                    name: 'needs-review',
                    color: '0075ca',
                    description: 'Waiting on human review',
                  });
                  core.info('Created missing needs-review label');

                  // Retry adding the label
                  await github.rest.issues.addLabels({
                    ...context.repo,
                    issue_number: context.payload.pull_request.number,
                    labels: ['needs-review'],
                  });
                } catch (retryError) {
                  core.warning(`Failed to create or apply needs-review label: ${retryError.message}`);
                }
              } else {
                core.warning(`Failed to apply needs-review label: ${error.message}`);
              }
            }
